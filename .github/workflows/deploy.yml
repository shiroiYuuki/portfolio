name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Trigger workflow ketika push ke branch 'main'

# Set izin (permissions) yang dibutuhkan untuk mendeploy ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Batasi hanya satu deployment aktif berjalan paralel
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Code
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
